services:
  db:
    image: postgres:15
    container_name: postgres-employee
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ex_di3212223!
      POSTGRES_DB: employee_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:Ex_di3212223!@db:5432/employee_db
      DATABASE_URL_ASYNC: postgresql+asyncpg://postgres:Ex_di3212223!@db:5432/employee_db
      APP_NAME: EmployeeService
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: