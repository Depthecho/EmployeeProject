{% extends "base.html" %}

{% block title %}Редактировать сотрудника{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-pencil-square"></i> Редактировать сотрудника</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}
                
                {% if employee %}
                <form method="POST" action="/employees/{{ employee.id }}/edit">
                    <div class="mb-3">
                        <label class="form-label">ФИО</label>
                        <input type="text" name="full_name" class="form-control" value="{{ employee.full_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Подразделение</label>
                        <input type="text" name="department" class="form-control" value="{{ employee.department }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Должность</label>
                        <input type="text" name="position" class="form-control" value="{{ employee.position }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Сохранить
                    </button>
                    <a href="/employees" class="btn btn-secondary">Отмена</a>
                </form>
                {% else %}
                <div class="alert alert-warning">
                    Сотрудник не найден
                </div>
                <a href="/employees" class="btn btn-secondary">Назад</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
