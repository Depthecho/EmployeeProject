<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Система заявок{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --border-glow: #00d4ff;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-cyan: #00d4ff;
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --gradient-main: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 20px;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            padding: 0 20px;
        }

        .navbar {
            background: rgba(17, 24, 39, 0.85) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            padding: 12px 0;
            margin-bottom: 30px;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .navbar-brand i {
            -webkit-text-fill-color: initial;
            color: var(--accent-cyan);
            margin-right: 10px;
        }

        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 400;
            padding: 8px 20px !important;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-primary) !important;
            background: rgba(0, 212, 255, 0.08);
        }

        .nav-link.active {
            color: var(--accent-cyan) !important;
            background: rgba(0, 212, 255, 0.12);
        }

        .nav-link i {
            margin-right: 8px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: var(--shadow-glow);
            transition: all 0.3s ease;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.08);
        }

        .card-header {
            background: rgba(0, 212, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 24px;
        }

        .card-header h5 {
            margin: 0;
            font-weight: 600;
        }

        .card-header h5 i {
            color: var(--accent-cyan);
            margin-right: 10px;
        }

        .card-body {
            padding: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            height: 100%;
        }

        .stat-card:hover {
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.08);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 400;
        }

        .stat-label i {
            margin-right: 6px;
        }

        .table {
            color: var(--text-primary);
            margin: 0;
        }

        .table > :not(caption) > * > * {
            background-color: transparent;
            border-bottom-color: rgba(255, 255, 255, 0.05);
        }

        .table thead th {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
        }

        .table tbody td {
            padding: 12px 16px;
            vertical-align: middle;
        }

        .table tbody tr {
            transition: all 0.2s ease;
        }

        .table tbody tr:hover {
            background: rgba(0, 212, 255, 0.03);
        }

        .status-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .status-new {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .status-in_progress {
            background: rgba(0, 212, 255, 0.12);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .status-completed {
            background: rgba(52, 211, 153, 0.12);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .badge-department {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .btn {
            border-radius: 10px;
            font-weight: 600;
            padding: 8px 20px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--gradient-main);
            border: none;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.3);
            color: white;
        }

        .btn-success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.25);
            color: #34d399;
        }

        .btn-success:hover {
            background: rgba(52, 211, 153, 0.25);
            border-color: rgba(52, 211, 153, 0.4);
            color: #34d399;
        }

        .btn-warning {
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .btn-warning:hover {
            background: rgba(251, 191, 36, 0.2);
            border-color: rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.15);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-primary);
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 10px 16px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.06);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .form-label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .page-title {
            font-weight: 700;
            font-size: 1.8rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .page-title i {
            -webkit-text-fill-color: initial;
            color: var(--accent-cyan);
            margin-right: 12px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .list-group-item {
            background: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            padding: 12px 0;
        }

        .list-group-item:last-child {
            border-bottom: none;
        }

        .list-group {
            border: none;
        }

        .alert {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .alert-info {
            background: rgba(0, 212, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.15);
            color: var(--accent-cyan);
        }

        .alert-warning {
            background: rgba(251, 191, 36, 0.08);
            border-color: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .footer {
            margin-top: 40px;
            padding: 24px 0;
            text-align: center;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.85rem;
        }

        .text-cyan {
            color: var(--accent-cyan);
        }

        .gap-2 {
            gap: 8px;
        }

        .mb-4 {
            margin-bottom: 24px;
        }
        .mb-3 {
            margin-bottom: 16px;
        }
        .mt-4 {
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.4rem;
            }
            .stat-number {
                font-size: 2rem;
            }
            .card-body {
                padding: 16px;
            }
            .container {
                padding: 0 12px;
            }
        }
.card-body {
    padding: 24px 28px;
}

.list-group-item {
    background: transparent;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text-primary);
    padding: 14px 0;
    font-size: 0.95rem;
}

.list-group-item strong {
    color: #ffffff;
    font-weight: 600;
}

.list-group-item .text-secondary {
    color: #a0b4c8 !important;
}

.card-header h5 {
    color: #ffffff;
    font-weight: 600;
    font-size: 1.05rem;
}

.card-header h5 i {
    color: var(--accent-cyan);
    margin-right: 10px;
}

.stat-number {
    font-size: 2.8rem;
    font-weight: 700;
    background: var(--gradient-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
}

.stat-label {
    color: #a0b4c8;
    font-size: 0.9rem;
    margin-top: 8px;
    font-weight: 400;
}

.stat-label i {
    margin-right: 6px;
    color: var(--accent-cyan);
}

.table tbody td {
    padding: 14px 16px;
    vertical-align: middle;
    color: #e2e8f0;
}

.table tbody td strong {
    color: #ffffff;
}

.table tbody td .text-secondary {
    color: #a0b4c8 !important;
}

a {
    color: var(--accent-cyan);
    text-decoration: none;
}

a:hover {
    color: #66e5ff;
}
        .list-group-item {
    background: transparent;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text-primary);
    padding: 14px 16px;
    font-size: 0.95rem;
    width: 100%;
}

.list-group-item:last-child {
    border-bottom: none;
}

.list-group-item strong {
    color: #ffffff;
    font-weight: 600;
}

.list-group-item .badge {
    font-size: 0.75rem;
    padding: 4px 12px;
}

.list-group-item .text-secondary {
    color: #94a3b8 !important;
    font-size: 0.85rem;
}


.list-group {
    border: none;
    margin: 0;
    padding: 0;
}

.card-body {
    padding: 24px 28px;
}

        * Яркие цвета для заявок */
.request-number {
    color: #ffffff;
    font-weight: 700;
    font-size: 0.95rem;
}

.request-description {
    color: #c8d6e5;
}

.request-author, .request-executor {
    color: #e2e8f0;
}

.request-deadline {
    color: #94a3b8;
}

.badge-department {
    background: rgba(0, 212, 255, 0.1);
    color: #00d4ff;
    padding: 2px 12px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
}

.table-requests td {
    padding: 14px 16px;
    vertical-align: middle;
    color: #e2e8f0;
}

.table-requests td strong {
    color: #ffffff;
}

.table-requests .text-muted {
    color: #94a3b8 !important;
}
        .pagination {
    gap: 4px;
}

.pagination .page-item {
    margin: 0;
}

.pagination .page-link {
    background: var(--bg-card);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text-secondary);
    padding: 6px 12px;
    font-size: 0.85rem;
    transition: all 0.2s ease;
    border-radius: 8px;
    min-width: 36px;
    text-align: center;
}

.pagination .page-link:hover {
    background: rgba(0, 212, 255, 0.08);
    border-color: rgba(0, 212, 255, 0.2);
    color: var(--text-primary);
    transform: translateY(-1px);
}

.pagination .page-item.active .page-link {
    background: var(--gradient-main);
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.25);
}

.pagination .page-item.active .page-link:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.35);
}

.pagination .page-item.disabled .page-link {
    opacity: 0.3;
    cursor: not-allowed;
}

.pagination .page-item.disabled .page-link:hover {
    transform: none;
    background: var(--bg-card);
    border-color: rgba(255, 255, 255, 0.08);
}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-motherboard"></i> Система заявок
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-house"></i> Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path.startswith('/employees') %}active{% endif %}" href="/employees">
                            <i class="bi bi-people"></i> Сотрудники
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path.startswith('/requests') %}active{% endif %}" href="/requests">
                            <i class="bi bi-list-ul"></i> Заявки
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path == '/statistics' %}active{% endif %}" href="/statistics">
                            <i class="bi bi-bar-chart"></i> Статистика
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 Система управления заявками</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
