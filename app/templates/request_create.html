{% extends "base.html" %}

{% block title %}Создать заявку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 style="color: #ffffff;"><i class="bi bi-plus-circle" style="color: #00d4ff;"></i> Новая заявка</h4>
            </div>
            <div class="card-body">
                {% if request.query_params.get('error') %}
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-circle me-2"></i> {{ request.query_params.get('error') }}
                </div>
                {% endif %}

                <form method="POST" action="/requests">
                    <div class="mb-3">
                        <label class="form-label" style="color: #94a3b8;">Описание</label>
                        <textarea name="description" class="form-control" rows="3" required placeholder="Введите описание заявки" style="color: #e2e8f0;"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label" style="color: #94a3b8;">Автор</label>
                                <select name="author_id" class="form-select select2-search" required style="color: #e2e8f0; width: 100%;">
                                    <option value="" style="color: #94a3b8;">Выберите автора</option>
                                    {% for emp in employees %}
                                    <option value="{{ emp.id }}" style="color: #e2e8f0;">{{ emp.full_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label" style="color: #94a3b8;">Исполнитель</label>
                                <select name="executor_id" class="form-select select2-search" style="color: #e2e8f0; width: 100%;">
                                    <option value="" style="color: #94a3b8;">Не назначен</option>
                                    {% for emp in employees %}
                                    <option value="{{ emp.id }}" style="color: #e2e8f0;">{{ emp.full_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="color: #94a3b8;">Срок выполнения</label>
                        <input type="datetime-local" name="deadline" class="form-control" required style="color: #e2e8f0;">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Создать
                        </button>
                        <a href="/requests" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
.select2-container--default .select2-selection--single {
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 10px !important;
    height: 44px !important;
    padding: 4px 12px !important;
    color: #e2e8f0 !important;
}

.select2-container--default .select2-selection--single .select2-selection__rendered {
    color: #e2e8f0 !important;
    line-height: 34px !important;
}

.select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 42px !important;
}

.select2-container--default .select2-selection--single .select2-selection__arrow b {
    border-color: #94a3b8 transparent transparent transparent !important;
}

.select2-container--default.select2-container--open .select2-selection--single .select2-selection__arrow b {
    border-color: transparent transparent #94a3b8 transparent !important;
}

.select2-container--default .select2-dropdown {
    background: #1a2234 !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5) !important;
}

.select2-container--default .select2-search--dropdown .select2-search__field {
    background: rgba(255, 255, 255, 0.05) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 8px !important;
    color: #e2e8f0 !important;
    padding: 8px 12px !important;
}

.select2-container--default .select2-search--dropdown .select2-search__field:focus {
    border-color: #00d4ff !important;
    outline: none !important;
}

.select2-container--default .select2-results__option {
    color: #e2e8f0 !important;
    padding: 8px 12px !important;
    background: transparent !important;
}

.select2-container--default .select2-results__option:hover {
    background: rgba(0, 212, 255, 0.08) !important;
}

.select2-container--default .select2-results__option--highlighted {
    background: rgba(0, 212, 255, 0.12) !important;
    color: #00d4ff !important;
}

.select2-container--default .select2-results__option[aria-selected="true"] {
    background: rgba(0, 212, 255, 0.08) !important;
    color: #00d4ff !important;
}

.select2-container--default .select2-results__option .select2-results__option--selected {
    background: rgba(0, 212, 255, 0.15) !important;
}

.select2-container--default .select2-results__group {
    color: #94a3b8 !important;
}

.select2-container--default .select2-selection--single .select2-selection__placeholder {
    color: #94a3b8 !important;
}

.select2-container--default .select2-search--dropdown {
    padding: 8px !important;
}

@media (max-width: 768px) {
    .select2-container--default .select2-selection--single {
        height: 38px !important;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 28px !important;
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 36px !important;
    }
}
</style>

<script>
$(document).ready(function() {
    // Инициализация Select2 для всех select с классом select2-search
    $('.select2-search').select2({
        placeholder: 'Поиск...',
        allowClear: true,
        width: '100%',
        dropdownAutoWidth: true,
        // Настройка поиска
        matcher: function(params, data) {
            // Если параметр поиска пустой - показываем все опции
            if ($.trim(params.term) === '') {
                return data;
            }

            // Проверяем, содержит ли текст опции поисковый запрос
            if (data.text && data.text.toLowerCase().indexOf(params.term.toLowerCase()) > -1) {
                return data;
            }

            // Если не найдено - возвращаем null
            return null;
        }
    });
});
</script>
{% endblock %}
