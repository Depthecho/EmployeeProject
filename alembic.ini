
[alembic]
# Путь к папке с миграциями
script_location = migrations

# Шаблон для имен файлов миграций
# %%(rev)s - ревизия, %%(slug)s - описание
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Пути для поиска миграций
prepend_sys_path = .

# Версия для миграций
version_path_separator = os
version_locations = %(script_location)s/versions

# Разрешить поиск .pyc файлов
# sourceless = false

# Автогенерация при revision
revision_environment = true

# ============================================
# ПОДКЛЮЧЕНИЕ К БАЗЕ ДАННЫХ
# ============================================
# ВАЖНО: Мы будем использовать переменную окружения
# Значение будет подставлено из .env через env.py
sqlalchemy.url = postgresql+asyncpg://postgres:Ex_di3212223!@db:5432/employee_db

# ============================================
# ЛОГИРОВАНИЕ
# ============================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# ============================================
# POST-WRITE HOOKS (опционально)
# Можно добавить форматирование кода
# ============================================

[post_write_hooks]
# Форматирование через Black (если установлен)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME